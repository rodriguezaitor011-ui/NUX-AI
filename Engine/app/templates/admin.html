<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - NUX IA</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5228198488593180" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #de4cf5;
            --bg: #0a0a0f;
            --panel-bg: rgba(20, 20, 30, 0.8);
            --border: rgba(222, 76, 245, 0.2);
            --text: #ffffff;
            --muted: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a0a1f 100%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* Reutilizando tus estilos anteriores optimizados */
        .admin-header {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-value { font-size: 32px; font-weight: 700; margin: 10px 0; }
        .stat-label { color: var(--muted); font-size: 14px; }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 1024px) { .charts-grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--muted); padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-admin { background: rgba(222, 76, 245, 0.2); color: var(--primary); }
        .badge-user { background: rgba(156, 163, 175, 0.2); color: var(--muted); }
        
        .search-input {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            width: 250px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-header">
        <div style="display:flex; align-items:center; gap:12px;">
            <i data-lucide="shield-check" color="#de4cf5"></i>
            <h1 style="font-size:24px;">Panel NUX IA</h1>
        </div>
        <a href="/app" style="color:var(--primary); text-decoration:none;">← Volver</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Usuarios Totales</div>
            <div class="stat-value" id="total-users">-</div>
            <div id="users-week" style="color:var(--success); font-size:12px;">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Interacciones</div>
            <div class="stat-value" id="total-chats">-</div>
            <div id="chats-today" style="color:var(--success); font-size:12px;">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Promedio Msg/User</div>
            <div class="stat-value" id="avg-messages">-</div>
            <div id="general-activity" style="color:var(--muted); font-size:12px;">Actividad general</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Usuario más activo</div>
            <div class="stat-value" id="most-active-user" style="font-size:20px;">-</div>
            <div id="user-messages" style="color:var(--primary); font-size:12px;">-</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="card">
            <h3>Actividad (7 días)</h3>
            <div style="height: 300px;">
                <canvas id="activityChart"></canvas>
            </div>
        </div>

        <div class="card" id="recent-chats-table">
            <h3>Últimos Chats</h3>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Mensaje</th>
                        <th>Respuesta</th>
                        <th>Hora</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="card" id="users-table">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Gestión de Usuarios</h3>
            <input type="text" id="user-search" class="search-input" placeholder="Buscar por nombre o email...">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Mensajes</th>
                    <th>Registro</th>
                    <th>Última Act.</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="pagination" style="display:flex; justify-content:center; gap:10px; margin-top:20px;"></div>
    </div>
</div>

<script>
// --- NUEVAS FUNCIONES IMPLEMENTADAS ---

async function adminFetch(url, options = {}) {
    const token = localStorage.getItem('auth_token');
    if (!token) {
        window.location.href = '/login';
        return null;
    }
    const headers = {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        ...options.headers
    };
    const response = await fetch(url, { ...options, headers });
    
    if (response.status === 401 || response.status === 403) {
        alert('Acceso denegado. Solo administradores pueden ver este panel.');
        window.location.href = '/app';
        return null;
    }
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
}

async function loadStats() {
    try {
        const data = await adminFetch('/api/admin/stats');
        if (!data) return;
        document.getElementById('total-users').textContent = data.users.total;
        document.getElementById('users-week').textContent = `+${data.users.week} esta semana`;
        document.getElementById('total-chats').textContent = data.chats.total;
        document.getElementById('chats-today').textContent = `+${data.chats.today} hoy`;
        document.getElementById('avg-messages').textContent = data.chats.average_per_user;
        document.getElementById('most-active-user').textContent = data.most_active_user.username;
        document.getElementById('user-messages').textContent = `${data.most_active_user.chat_count} mensajes`;
    } catch (error) { console.error('Error stats:', error); }
}

async function loadActivity() {
    try {
        const data = await adminFetch('/api/admin/activity?days=7');
        if (!data) return;
        const labels = data.activity.map(d => new Date(d.date).toLocaleDateString('es-ES', { month: 'short', day: 'numeric' }));
        const values = data.activity.map(d => d.count);
        const ctx = document.getElementById('activityChart').getContext('2d');
        if (window.activityChart) window.activityChart.destroy();
        window.activityChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Interacciones',
                    data: values,
                    borderColor: '#de4cf5',
                    backgroundColor: 'rgba(222, 76, 245, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    } catch (error) { console.error('Error activity:', error); }
}

async function loadRecentChats() {
    try {
        const data = await adminFetch('/api/admin/recent-chats?limit=10');
        if (!data) return;
        const tbody = document.querySelector('#recent-chats-table tbody');
        tbody.innerHTML = data.chats.length ? '' : '<tr><td colspan="4">No hay chats</td></tr>';
        data.chats.forEach(chat => {
            const row = document.createElement('tr');
            const timeStr = new Date(chat.timestamp).toLocaleString('es-ES', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
            row.innerHTML = `<td><strong>${chat.username}</strong></td><td>${chat.message}</td><td>${chat.response || '-'}</td><td>${timeStr}</td>`;
            tbody.appendChild(row);
        });
    } catch (error) { console.error('Error chats:', error); }
}

async function loadUsers(page = 1, search = '') {
    try {
        let url = `/api/admin/users?page=${page}&limit=10${search ? `&search=${encodeURIComponent(search)}` : ''}`;
        const data = await adminFetch(url);
        if (!data) return;
        const tbody = document.querySelector('#users-table tbody');
        tbody.innerHTML = '';
        data.users.forEach(user => {
            const row = document.createElement('tr');
            const roleBadge = user.is_admin ? '<span class="badge badge-admin">Admin</span>' : '<span class="badge badge-user">Usuario</span>';
            row.innerHTML = `
                <td><strong>${user.username}</strong></td>
                <td>${user.email}</td>
                <td>${roleBadge}</td>
                <td>${user.chat_count}</td>
                <td>${new Date(user.created_at).toLocaleDateString('es-ES')}</td>
                <td>${user.last_activity ? new Date(user.last_activity).toLocaleDateString('es-ES') : 'Nunca'}</td>
            `;
            tbody.appendChild(row);
        });
        updatePagination(data.page, data.pages);
    } catch (error) { console.error('Error users:', error); }
}

function updatePagination(current, total) {
    const nav = document.getElementById('pagination');
    nav.innerHTML = '';
    for(let i=1; i<=total; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.style.cssText = `padding: 5px 10px; cursor: pointer; background: ${i === current ? 'var(--primary)' : 'transparent'}; color: white; border: 1px solid var(--primary); border-radius: 4px;`;
        btn.onclick = () => loadUsers(i, document.getElementById('user-search').value);
        nav.appendChild(btn);
    }
}

// Búsqueda en tiempo real
document.getElementById('user-search').addEventListener('input', (e) => {
    loadUsers(1, e.target.value);
});

async function init() {
    const token = localStorage.getItem('auth_token');
    if (!token) { window.location.href = '/login'; return; }
    await Promise.all([loadStats(), loadActivity(), loadRecentChats(), loadUsers()]);
    lucide.createIcons();
    setInterval(() => { loadStats(); loadRecentChats(); }, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
